spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:mysql://localhost:3306/${MYSQL_DATABASE}
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

logging:
  level:
    org.hibernate.SQL: debug

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
