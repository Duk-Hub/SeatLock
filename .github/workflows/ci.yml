name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: seatlock
          MYSQL_USER: seatlock
          MYSQL_PASSWORD: seatlock
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build & Test
        run: ./gradlew build
        env:
          MYSQL_DATABASE: seatlock
          MYSQL_USER: seatlock
          MYSQL_PASSWORD: seatlock
          JWT_SECRET: Y2ktb25seS1zZWNyZXQtY2ktb25seS1zZWNyZXQtMTI=
